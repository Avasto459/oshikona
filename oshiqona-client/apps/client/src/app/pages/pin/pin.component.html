<div class="pin-wrapper">

  <!-- Header -->
  <header class="header-section">
    <h1 class="title">Pin</h1>
    <div class="tab-container">
      <button
        type="button"
        [class.active]="activeTab === 'set'"
        (click)="setTab('set')">
        Установить PIN
      </button>
      <button
        type="button"
        [class.active]="activeTab === 'change'"
        (click)="setTab('change')">
        Сменить PIN
      </button>
    </div>
  </header>

  <!-- Shield icon -->
  <div class="main-illustration">
    <div class="shield-circle">
      <img
        src="https://cdn-icons-png.flaticon.com/512/6195/6195699.png"
        alt="shield"
        class="shield-img"
      />
    </div>
  </div>

  <!-- PIN inputs -->
  <div class="form-group">
    <div class="input-field">
      <label for="pin-input">PIN код</label>
      <input
        id="pin-input"
        type="password"
        inputmode="numeric"
        pattern="[0-9]*"
        [(ngModel)]="pin"
        placeholder="Введите PIN"
        class="custom-input"
        maxlength="4"
        autocomplete="new-password"
      />
    </div>
    <div class="input-field">
      <label for="repeat-pin-input">Повтор ввода PIN</label>
      <input
        id="repeat-pin-input"
        type="password"
        inputmode="numeric"
        pattern="[0-9]*"
        [(ngModel)]="repeatPin"
        placeholder="Введите PIN"
        class="custom-input"
        maxlength="4"
        autocomplete="new-password"
      />
    </div>
  </div>

  <!-- Biometric icons -->
  <div class="biometric-section" *ngIf="biometricSupported">
    <div class="bio-icons-container">

      <!-- Face ID: танҳо iOS -->
      <div
        class="bio-item"
        *ngIf="deviceType === 'ios'"
        (click)="setupBiometric('faceid')"
      >
        <img
          src="assets/icons/face-id.png"
          alt="Face ID"
          class="bio-img"
        />
        <span>Face ID</span>
      </div>

      <!-- Fingerprint: iOS + Android + web -->
      <div
        class="bio-item"
        (click)="setupBiometric('fingerprint')"
      >
        <img
          src="assets/icons/fingerprint.png"
          alt="Fingerprint"
          class="bio-img"
        />
        <span>Отпечаток</span>
      </div>

    </div>
    <p class="bio-hint">Барои тезтар воридшавӣ биометрияро танзим кунед</p>
  </div>

  <!-- Биометрия дастгирӣ намешавад -->
  <div class="biometric-unavailable" *ngIf="!biometricSupported">
    <p>Дар ин дастгоҳ биометрия дастгирӣ намешавад</p>
  </div>

  <!-- Action buttons -->
  <div class="actions">
    <button
      type="button"
      class="btn-submit"
      [disabled]="!biometricSupported"
      (click)="setupBiometric(deviceType === 'ios' ? 'faceid' : 'fingerprint')"
    >
      Настройте биометрию
    </button>
    <button type="button" class="btn-skip" (click)="skipBiometrics()">
      Пропустить
    </button>
  </div>

</div>
